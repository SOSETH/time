---
# Possible values to override the default:
#  - timesyncd
#  - chrony
# time_client_override:

# Timezone of the machine
timezone_area: Europe
timezone: Zurich

# Timeservers that are used for time sync. If a domain name here resolves to multiple A/AAAA records, all of them are used.
# For ETHZ timeservers, use:
#  ntp_servers: [time.ethz.ch, swisstime.ethz.ch]
ntp_servers:
  - time.ethz.ch
  - swisstime.ethz.ch

# Optional Chrony drop-in source files.
# The legacy ntp_servers-based chrony.conf remains managed as before.
ntp_sources_dir:
  dir: /etc/chrony/sources.d
  # List of drop-in source files to manage.
  # Example:
  # files:
  #   - name: ethz.sources
  #     servers: [time.ethz.ch, swisstime.ethz.ch]
  files: []

# Prefer using a chrony conf.d drop-in instead of managing the main
# chrony.conf. Can be overridden in OS/release-specific vars.
# Path for the managed drop-in file when time_chrony_use_dropins=true.
time_chrony_conf_dropin_dir:
  use: false
  dir: /etc/chrony/conf.d/
  defaultFile: custom.conf
